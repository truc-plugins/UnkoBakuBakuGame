<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>💩 うんこバクバクゲーム</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #fffbe6;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
    touch-action: none;
    overflow: hidden;
  }
  h1 {
    font-size: clamp(14px, 4vw, 22px);
    font-weight: 700;
    color: #7a4500;
    margin-bottom: 6px;
    letter-spacing: 0.05em;
  }
  #hud {
    display: flex;
    gap: 16px;
    margin-bottom: 8px;
    font-size: clamp(12px, 3.5vw, 15px);
    font-weight: 600;
    color: #5a3300;
    flex-wrap: wrap;
    justify-content: center;
  }
  #hud span { font-weight: 400; color: #a07040; font-size: 0.85em; }
  #canvas-wrap {
    position: relative;
    border-radius: 12px;
    border: 2px solid #e8d8a0;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(120,80,0,0.12);
    width: min(560px, 100vw - 16px);
  }
  canvas { display: block; width: 100%; height: auto; }
  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(255,251,230,0.93);
    color: #5a3300;
    gap: 8px;
  }
  #overlay h2 { font-size: clamp(16px, 4vw, 24px); font-weight: 700; }
  #overlay p  { font-size: clamp(10px, 2.8vw, 13px); color: #a07040; text-align: center; line-height: 1.8; padding: 0 12px; }
  #overlay .btn-row { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-top: 4px; }
  #overlay button {
    padding: 12px 28px;
    border-radius: 8px;
    border: 2px solid #c8a060;
    background: #fff8e1;
    color: #7a4500;
    font-size: clamp(13px, 3.5vw, 15px);
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    font-family: inherit;
    -webkit-tap-highlight-color: transparent;
  }
  #overlay button:active { background: #ffefc0; transform: scale(1.04); }
  #overlay button.btn-4p { border-color: #8844cc; color: #5500aa; background: #f8f0ff; }
  #overlay button.btn-4p:active { background: #eeddff; }
  #msg {
    position: absolute;
    top: 10px; left: 50%;
    transform: translateX(-50%);
    font-size: clamp(14px, 4vw, 20px);
    font-weight: 700;
    pointer-events: none;
    opacity: 0;
    color: #b05a00;
    text-shadow: 0 1px 6px rgba(255,255,255,0.9);
    white-space: nowrap;
  }
  #info { margin-top: 8px; font-size: clamp(10px, 2.5vw, 12px); color: #b09060; text-align: center; }
  /* Dパッド */
  #dpad {
    display: none;
    margin-top: 16px;
    position: relative;
    width: 140px; height: 140px;
    flex-shrink: 0;
  }
  #dpad button {
    position: absolute; width: 44px; height: 44px;
    border-radius: 8px; border: 2px solid #c8a060;
    background: rgba(255,248,225,0.9); color: #7a4500;
    font-size: 20px; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    touch-action: none; user-select: none;
    display: flex; align-items: center; justify-content: center;
  }
  #dpad button:active, #dpad button.pressed { background: #ffd080; }
  #btn-up    { top: 0;    left: 50%; transform: translateX(-50%); }
  #btn-down  { bottom: 0; left: 50%; transform: translateX(-50%); }
  #btn-left  { left: 0;  top: 50%; transform: translateY(-50%); }
  #btn-right { right: 0; top: 50%; transform: translateY(-50%); }
  @media (pointer: coarse) {
    #dpad { display: flex; }
    body { justify-content: flex-start; padding-top: 12px; overflow-y: auto; }
  }
</style>
</head>
<body>
<h1>💩 うんこバクバクゲーム 💩</h1>
<div id="hud">
  <div id="hud-solo">
    スコア: <span id="score-val">0</span>
    レベル: <span id="level-val">1</span>
    残機: <span id="lives-val">❤️❤️❤️</span>
  </div>
  <div id="hud-4p" style="display:none; gap:12px; flex-wrap:wrap; justify-content:center;"></div>
</div>
<div id="canvas-wrap">
  <canvas id="gc" width="560" height="400"></canvas>
  <div id="msg"></div>
  <div id="overlay">
    <h2>💩 うんこバクバクゲーム 💩</h2>
    <p>うんこを食べまくれ！💣 爆弾は避けろ！<br>
      1:30後に特殊うんこ登場：💖 1UP / 🐌 スロー / ⚡ スピード<br>
      3分後には 💀 黒いうんこも…</p>
    <div class="btn-row">
      <button onclick="startGame('solo')">🎮 ソロプレイ</button>
      <button class="btn-4p" onclick="startGame('4p')">👥 4人対戦</button>
    </div>
  </div>
</div>
<div id="info" id="info-solo">📱 ドラッグ or Dパッドで操作 | ⌨️ 矢印キーでも OK</div>
<div id="dpad">
  <button id="btn-up"    aria-label="上">▲</button>
  <button id="btn-left"  aria-label="左">◀</button>
  <button id="btn-right" aria-label="右">▶</button>
  <button id="btn-down"  aria-label="下">▼</button>
</div>

<script>
const canvas = document.getElementById('gc');
const ctx    = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// ===== 共通 =====
let state    = 'idle';   // idle | playing | over
let gameMode = 'solo';   // solo | 4p
let unkos, bombs, specialUnkos, particles, frame, animId;
let keys = {};           // e.code ベース

// ===== ソロ =====
let score = 0, level = 1, lives = 3;
let soloPlayer;
let slowTimer = 0, fastTimer = 0, hellTimer = 0;

// ===== 4人対戦 =====
const P4_TIME = 60; // 秒
let timeLeft = 0, timerFrame = 0;
let players4 = [];

const PCONF = [
  { emoji:'😮', color:'#e07000', label:'P1',
    up:'ArrowUp',  down:'ArrowDown',  left:'ArrowLeft', right:'ArrowRight' },
  { emoji:'😛', color:'#0077dd', label:'P2',
    up:'KeyW',     down:'KeyS',       left:'KeyA',      right:'KeyD' },
  { emoji:'😜', color:'#009944', label:'P3',
    up:'KeyI',     down:'KeyK',       left:'KeyJ',      right:'KeyL' },
  { emoji:'😝', color:'#9900bb', label:'P4',
    up:'Numpad8',  down:'Numpad2',    left:'Numpad4',   right:'Numpad6' },
];

// ===== タッチ =====
let touchTarget = null;

function getCanvasPos(cx, cy) {
  const r = canvas.getBoundingClientRect();
  return { x:(cx-r.left)*(W/r.width), y:(cy-r.top)*(H/r.height) };
}
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if(state!=='playing'||gameMode!=='solo') return;
  touchTarget = getCanvasPos(e.touches[0].clientX, e.touches[0].clientY);
}, {passive:false});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if(state!=='playing'||gameMode!=='solo') return;
  touchTarget = getCanvasPos(e.touches[0].clientX, e.touches[0].clientY);
}, {passive:false});
canvas.addEventListener('touchend', e => { e.preventDefault(); touchTarget=null; }, {passive:false});

// ===== Dパッド =====
const dpadMap = { 'btn-up':'ArrowUp','btn-down':'ArrowDown','btn-left':'ArrowLeft','btn-right':'ArrowRight' };
for(const [id,key] of Object.entries(dpadMap)){
  const btn = document.getElementById(id);
  btn.addEventListener('touchstart', e=>{ e.preventDefault(); keys[key]=true;  btn.classList.add('pressed'); },    {passive:false});
  btn.addEventListener('touchend',   e=>{ e.preventDefault(); keys[key]=false; btn.classList.remove('pressed'); }, {passive:false});
  btn.addEventListener('mousedown',  ()=>{ keys[key]=true;  btn.classList.add('pressed'); });
  btn.addEventListener('mouseup',    ()=>{ keys[key]=false; btn.classList.remove('pressed'); });
  btn.addEventListener('mouseleave', ()=>{ keys[key]=false; btn.classList.remove('pressed'); });
}

// ===== キーボード (e.code ベース) =====
document.addEventListener('keydown', e => {
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
  keys[e.code] = true;
  // Dパッド互換（ソロ用仮想キー）
  if(e.key==='ArrowUp')    keys['ArrowUp']=true;
  if(e.key==='ArrowDown')  keys['ArrowDown']=true;
  if(e.key==='ArrowLeft')  keys['ArrowLeft']=true;
  if(e.key==='ArrowRight') keys['ArrowRight']=true;
});
document.addEventListener('keyup', e => {
  keys[e.code] = false;
  if(e.key==='ArrowUp')    keys['ArrowUp']=false;
  if(e.key==='ArrowDown')  keys['ArrowDown']=false;
  if(e.key==='ArrowLeft')  keys['ArrowLeft']=false;
  if(e.key==='ArrowRight') keys['ArrowRight']=false;
});

// ===== ゲーム開始 =====
function startGame(mode) {
  gameMode = mode;
  document.getElementById('overlay').style.display = 'none';
  unkos=[]; bombs=[]; specialUnkos=[]; particles=[];
  frame=0; touchTarget=null;

  if(mode === 'solo') {
    score=0; level=1; lives=3;
    soloPlayer = { x:W/2, y:H/2, vx:0, vy:0, invincible:0 };
    slowTimer=0; fastTimer=0; hellTimer=0;
    document.getElementById('hud-solo').style.display = '';
    document.getElementById('hud-4p').style.display   = 'none';
    document.getElementById('info').textContent        = '📱 ドラッグ or Dパッドで操作 | ⌨️ 矢印キーでも OK';
    updateHUDSolo();
  } else {
    timeLeft  = P4_TIME;
    timerFrame = 0;
    players4 = PCONF.map((c,i) => ({
      ...c,
      x: [W*0.25, W*0.75, W*0.25, W*0.75][i],
      y: [H*0.3,  H*0.3,  H*0.7,  H*0.7 ][i],
      vx:0, vy:0, score:0, stun:0
    }));
    document.getElementById('hud-solo').style.display = 'none';
    document.getElementById('hud-4p').style.display   = 'flex';
    document.getElementById('info').textContent        =
      'P1:矢印 | P2:WASD | P3:IJKL | P4:テンキー8246';
    updateHUD4P();
  }

  if(animId) cancelAnimationFrame(animId);
  state = 'playing';
  loop();
}

// ===== スポーン =====
function edgePos() {
  const side = Math.random();
  if(side<0.25)      return {x:Math.random()*W, y:-30};
  else if(side<0.5)  return {x:Math.random()*W, y:H+30};
  else if(side<0.75) return {x:-30, y:Math.random()*H};
  else               return {x:W+30, y:Math.random()*H};
}
function spawnUnko() {
  const {x,y} = edgePos();
  const angle = Math.atan2(H/2-y, W/2-x) + (Math.random()-0.5)*0.8;
  const spd = gameMode==='solo' ? (0.6+Math.random()*0.8+level*0.1) : (1.0+Math.random()*0.8);
  unkos.push({x,y, vx:Math.cos(angle)*spd, vy:Math.sin(angle)*spd, rot:Math.random()*Math.PI*2, size:20+Math.random()*10});
}
function spawnBomb() {
  const {x,y} = edgePos();
  const angle = Math.atan2(H/2-y, W/2-x) + (Math.random()-0.5)*0.5;
  const spd = gameMode==='solo' ? (0.5+Math.random()*0.6+level*0.08) : (0.8+Math.random()*0.6);
  bombs.push({x,y, vx:Math.cos(angle)*spd, vy:Math.sin(angle)*spd, rot:Math.random()*Math.PI*2});
}
function spawnSpecialUnko(type) {
  const {x,y} = edgePos();
  const angle = Math.atan2(H/2-y, W/2-x) + (Math.random()-0.5)*0.6;
  const spd   = 0.5+Math.random()*0.5;
  specialUnkos.push({x,y, vx:Math.cos(angle)*spd, vy:Math.sin(angle)*spd, rot:Math.random()*Math.PI*2, type});
}

// ===== パーティクル =====
function addParticles(x, y, color, n) {
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, s=1+Math.random()*3;
    particles.push({x,y, vx:Math.cos(a)*s, vy:Math.sin(a)*s, life:40+Math.random()*20, color, size:4+Math.random()*5});
  }
}

// ===== 描画 =====
function drawUnko(cx,cy,size,rot) {
  ctx.save(); ctx.translate(cx,cy); ctx.rotate(rot); ctx.scale(size/24,size/24);
  ctx.font='24px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('💩',0,0); ctx.restore();
}
function drawBomb(cx,cy,rot) {
  ctx.save(); ctx.translate(cx,cy); ctx.rotate(rot);
  ctx.font='22px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('💣',0,0); ctx.restore();
}
function drawSpecialUnko(s) {
  const pulse = 0.8+0.2*Math.sin(frame*0.15);
  ctx.save(); ctx.translate(s.x,s.y); ctx.rotate(s.rot);
  const glow = {oneup:'#ff88cc', slow:'#44aaff', fast:'#ffdd00', hell:'#220000'}[s.type];
  ctx.shadowColor=glow; ctx.shadowBlur=14*pulse;
  ctx.font='26px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  if(s.type==='hell'){ ctx.filter='brightness(0)'; ctx.fillText('💩',0,0); ctx.filter='none'; }
  else ctx.fillText('💩',0,0);
  ctx.shadowBlur=0; ctx.font='12px serif';
  ctx.fillText({oneup:'💖',slow:'🐌',fast:'⚡',hell:'💀'}[s.type], 14,-14);
  ctx.restore();
}
function drawSoloPlayer(p) {
  if(p.invincible>0 && Math.floor(p.invincible/5)%2===0) return;
  ctx.save(); ctx.translate(p.x,p.y);
  ctx.font='28px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('😮',0,0); ctx.restore();
}
function draw4PPlayer(p) {
  if(p.stun>0 && Math.floor(p.stun/5)%2===0) return;
  ctx.save(); ctx.translate(p.x,p.y);
  // 名前ラベル
  ctx.font='bold 11px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='bottom';
  ctx.fillStyle=p.color; ctx.fillText(p.label, 0, -16);
  // スコア
  ctx.font='10px sans-serif'; ctx.fillStyle=p.color; ctx.textBaseline='bottom';
  ctx.fillText(p.score+'pt', 0, -6);
  // キャラ
  ctx.font='26px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(p.emoji,0,0);
  ctx.restore();
}

function dist(a,b){ return Math.sqrt((a.x-b.x)**2+(a.y-b.y)**2); }

function showMsg(txt) {
  const el = document.getElementById('msg');
  el.textContent=txt; el.style.transition='none'; el.style.opacity='1'; el.style.top='10px';
  setTimeout(()=>{ el.style.transition='opacity 0.8s, top 0.8s'; el.style.opacity='0'; el.style.top='-10px'; }, 700);
}

// ===== HUD =====
function updateHUDSolo() {
  document.getElementById('score-val').textContent = score;
  document.getElementById('level-val').textContent = level;
  document.getElementById('lives-val').textContent = '❤️'.repeat(lives);
}
function updateHUD4P() {
  const el = document.getElementById('hud-4p');
  el.innerHTML = players4.map(p=>
    `<div style="color:${p.color};font-weight:700">${p.emoji} ${p.label}: <span style="font-weight:400">${p.score}pt</span></div>`
  ).join('') + `<div style="color:#7a4500;font-weight:700">⏱ <span id="timer-val">${timeLeft}</span>s</div>`;
}
function updateTimer() {
  const el = document.getElementById('timer-val');
  if(el) el.textContent = timeLeft;
}

// ===== ゲームオーバー（ソロ）=====
function gameOverSolo() {
  state='over';
  const ov = document.getElementById('overlay');
  ov.innerHTML=`<h2>ゲームオーバー</h2><p>スコア: ${score} pts<br>レベル: ${level}</p>
    <div class="btn-row">
      <button onclick="startGame('solo')">もう一回！</button>
      <button class="btn-4p" onclick="startGame('4p')">👥 4人対戦</button>
    </div>`;
  ov.style.display='flex';
}

// ===== タイムアップ（4P）=====
function timeUp() {
  state='over';
  const sorted = [...players4].sort((a,b)=>b.score-a.score);
  const medals = ['🥇','🥈','🥉','4️⃣'];
  const rows = sorted.map((p,i)=>
    `${medals[i]} ${p.emoji} ${p.label}: ${p.score}pt`
  ).join('<br>');
  const winner = sorted[0];
  const ov = document.getElementById('overlay');
  ov.innerHTML=`<h2>${winner.emoji} ${winner.label} の勝ち！！</h2>
    <p style="font-size:clamp(11px,3vw,14px);line-height:2">${rows}</p>
    <div class="btn-row">
      <button class="btn-4p" onclick="startGame('4p')">もう一回！</button>
      <button onclick="startGame('solo')">🎮 ソロプレイ</button>
    </div>`;
  ov.style.display='flex';
}

// ===== メインループ =====
function loop() {
  if(state!=='playing') return;
  frame++;

  if(gameMode==='solo') loopSolo();
  else                  loop4P();

  animId = requestAnimationFrame(loop);
}

// ===== ソロループ =====
function loopSolo() {
  const p = soloPlayer;
  const speed = (2.8+level*0.2) * (fastTimer>0?1.9:1) * (slowTimer>0?0.45:1);

  if(touchTarget){
    const dx=touchTarget.x-p.x, dy=touchTarget.y-p.y, d=Math.sqrt(dx*dx+dy*dy);
    if(d>8){ p.vx+=(dx/d)*0.6; p.vy+=(dy/d)*0.6; }
  }
  if(keys['ArrowLeft'])  p.vx-=0.5;
  if(keys['ArrowRight']) p.vx+=0.5;
  if(keys['ArrowUp'])    p.vy-=0.5;
  if(keys['ArrowDown'])  p.vy+=0.5;
  p.vx*=0.82; p.vy*=0.82;
  const spd=Math.sqrt(p.vx**2+p.vy**2);
  if(spd>speed){ p.vx=p.vx/spd*speed; p.vy=p.vy/spd*speed; }
  p.x=Math.max(14,Math.min(W-14,p.x+p.vx));
  p.y=Math.max(14,Math.min(H-14,p.y+p.vy));
  if(p.invincible>0) p.invincible--;

  if(slowTimer>0) slowTimer--;
  if(fastTimer>0) fastTimer--;
  if(hellTimer>0) hellTimer--;

  const interval=Math.max(30,80-level*5);
  if(frame%interval===0) spawnUnko();
  if(frame%(interval+20)===0) spawnBomb();
  if(frame>=5400){
    if(frame%300===150) spawnSpecialUnko(Math.random()<0.5?'slow':'fast');
    if(lives<3 && Math.random()<1/300) spawnSpecialUnko('oneup');
    if(frame>=10800 && Math.random()<1/300) spawnSpecialUnko('hell');
  }

  const bombMult=hellTimer>0?3.5:1;
  for(let u of unkos)        { u.x+=u.vx; u.y+=u.vy; u.rot+=0.04; }
  for(let b of bombs)        { b.x+=b.vx*bombMult; b.y+=b.vy*bombMult; b.rot+=0.06*bombMult; }
  for(let s of specialUnkos) { s.x+=s.vx; s.y+=s.vy; s.rot+=0.05; }

  unkos=unkos.filter(u=>{
    if(u.x<-60||u.x>W+60||u.y<-60||u.y>H+60) return false;
    if(dist(u,p)<18+u.size*0.4){
      addParticles(u.x,u.y,'#c8a060',8);
      score+=10+level;
      const msgs=['バクッ！','ウマッ！','パクッ！','もぐもぐ！','ゴクッ！'];
      if(Math.random()<0.4) showMsg(msgs[Math.floor(Math.random()*msgs.length)]);
      if(score>=level*120){ level++; showMsg('レベルアップ！🎉'); }
      updateHUDSolo(); return false;
    }
    return true;
  });

  bombs=bombs.filter(b=>{
    if(b.x<-60||b.x>W+60||b.y<-60||b.y>H+60) return false;
    if(p.invincible===0 && dist(b,p)<18){
      addParticles(b.x,b.y,'#ff6633',12);
      lives--; p.invincible=90; showMsg('ドカン！💥');
      updateHUDSolo();
      if(lives<=0){ gameOverSolo(); return false; }
      return false;
    }
    return true;
  });

  specialUnkos=specialUnkos.filter(s=>{
    if(s.x<-60||s.x>W+60||s.y<-60||s.y>H+60) return false;
    if(dist(s,p)<22){
      if(s.type==='oneup'){ lives=Math.min(lives+1,3); addParticles(s.x,s.y,'#ff88cc',14); showMsg('1UP！💖'); updateHUDSolo(); }
      else if(s.type==='slow'){ slowTimer=300; addParticles(s.x,s.y,'#44aaff',14); showMsg('スロー…🐌'); }
      else if(s.type==='fast'){ fastTimer=300; addParticles(s.x,s.y,'#ffdd00',14); showMsg('スピードアップ！⚡'); }
      else if(s.type==='hell'){ hellTimer=600; addParticles(s.x,s.y,'#440000',20); showMsg('💀 地獄！爆弾が暴走！！'); }
      return false;
    }
    return true;
  });

  drawSoloScene(p);
}

function drawSoloScene(p) {
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#fffbe6'; ctx.fillRect(0,0,W,H);
  if(hellTimer>0){
    const r=0.5+0.5*Math.sin(frame*0.3);
    ctx.fillStyle=`rgba(180,0,0,${0.10+0.08*r})`; ctx.fillRect(0,0,W,H);
  }
  drawGrid();
  drawParticles();
  for(let u of unkos) drawUnko(u.x,u.y,u.size,u.rot);
  for(let b of bombs) drawBomb(b.x,b.y,b.rot);
  for(let s of specialUnkos) drawSpecialUnko(s);
  drawSoloPlayer(p);

  // エフェクト残時間
  if(slowTimer>0||fastTimer>0||hellTimer>0){
    ctx.save(); ctx.font='bold 13px sans-serif'; ctx.textBaseline='top';
    let ex=6;
    if(slowTimer>0){ ctx.fillStyle='#1188ff'; ctx.fillText(`🐌 ${Math.ceil(slowTimer/60)}s`,ex,6); ex+=64; }
    if(fastTimer>0){ ctx.fillStyle='#cc8800'; ctx.fillText(`⚡ ${Math.ceil(fastTimer/60)}s`,ex,6); ex+=64; }
    if(hellTimer>0){ ctx.fillStyle='#cc0000'; ctx.fillText(`💀 ${Math.ceil(hellTimer/60)}s`,ex,6); }
    ctx.restore();
  }
}

// ===== 4Pループ =====
function loop4P() {
  // タイマー（60fps想定）
  timerFrame++;
  if(timerFrame>=60){ timerFrame=0; timeLeft--; updateTimer(); }
  if(timeLeft<=0){ timeUp(); return; }

  const interval = Math.max(20, 60);
  if(frame%interval===0) spawnUnko();
  if(frame%(interval+15)===0) spawnBomb();

  // 各プレイヤー移動
  for(const p of players4){
    if(p.stun>0){ p.stun--; continue; }
    const speed=3.0;
    if(keys[p.up])    p.vy-=0.55;
    if(keys[p.down])  p.vy+=0.55;
    if(keys[p.left])  p.vx-=0.55;
    if(keys[p.right]) p.vx+=0.55;
    p.vx*=0.82; p.vy*=0.82;
    const spd=Math.sqrt(p.vx**2+p.vy**2);
    if(spd>speed){ p.vx=p.vx/spd*speed; p.vy=p.vy/spd*speed; }
    p.x=Math.max(14,Math.min(W-14,p.x+p.vx));
    p.y=Math.max(14,Math.min(H-14,p.y+p.vy));
  }

  for(let u of unkos) { u.x+=u.vx; u.y+=u.vy; u.rot+=0.04; }
  for(let b of bombs) { b.x+=b.vx; b.y+=b.vy; b.rot+=0.06; }

  // うんこ取得（一番近いプレイヤーが取る）
  unkos=unkos.filter(u=>{
    if(u.x<-60||u.x>W+60||u.y<-60||u.y>H+60) return false;
    for(const p of players4){
      if(p.stun>0) continue;
      if(dist(u,p)<18+u.size*0.4){
        addParticles(u.x,u.y,p.color,8);
        p.score+=10;
        updateHUD4P();
        return false;
      }
    }
    return true;
  });

  // 爆弾ヒット（スタン+スコア-15）
  bombs=bombs.filter(b=>{
    if(b.x<-60||b.x>W+60||b.y<-60||b.y>H+60) return false;
    for(const p of players4){
      if(p.stun>0) continue;
      if(dist(b,p)<18){
        addParticles(b.x,b.y,'#ff6633',12);
        p.score=Math.max(0,p.score-15);
        p.stun=90;
        showMsg(`${p.emoji} ドカン！💥 -15pt`);
        updateHUD4P();
        return false;
      }
    }
    return true;
  });

  draw4PScene();
}

function draw4PScene() {
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#f0f8ff'; ctx.fillRect(0,0,W,H); // 4P用は薄青背景
  drawGrid('#e0ecf8');
  drawParticles();
  for(let u of unkos) drawUnko(u.x,u.y,u.size,u.rot);
  for(let b of bombs) drawBomb(b.x,b.y,b.rot);
  for(const p of players4) draw4PPlayer(p);

  // 残り時間バー
  const barW=(timeLeft/P4_TIME)*W;
  ctx.fillStyle=timeLeft>15?'#88cc44':timeLeft>5?'#ffaa00':'#ff3300';
  ctx.fillRect(0,H-5,barW,5);

  // カウントダウン警告
  if(timeLeft<=5){
    ctx.save();
    ctx.font=`bold ${30+Math.sin(frame*0.3)*4}px sans-serif`;
    ctx.fillStyle=`rgba(200,0,0,${0.6+0.3*Math.sin(frame*0.2)})`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(`⏱ ${timeLeft}`, W/2, H/2);
    ctx.restore();
  }
}

// ===== 共通描画ヘルパー =====
function drawGrid(color='#f0e8c8') {
  ctx.strokeStyle=color; ctx.lineWidth=1;
  for(let gx=0;gx<W;gx+=40){ ctx.beginPath(); ctx.moveTo(gx,0); ctx.lineTo(gx,H); ctx.stroke(); }
  for(let gy=0;gy<H;gy+=40){ ctx.beginPath(); ctx.moveTo(0,gy); ctx.lineTo(W,gy); ctx.stroke(); }
}
function drawParticles() {
  for(const p of particles){
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.08; p.life--;
    if(p.life<=0) continue;
    ctx.globalAlpha=p.life/50; ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
  particles=particles.filter(p=>p.life>0);
}
</script>
