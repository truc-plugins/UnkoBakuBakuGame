<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>💩 うんこバクバクゲーム</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #fffbe6;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
    touch-action: none;
    overflow: hidden;
  }
  h1 {
    font-size: clamp(14px, 4vw, 22px);
    font-weight: 700;
    color: #7a4500;
    margin-bottom: 6px;
    letter-spacing: 0.05em;
  }
  #hud {
    display: flex;
    gap: 16px;
    margin-bottom: 8px;
    font-size: clamp(12px, 3.5vw, 15px);
    font-weight: 600;
    color: #5a3300;
  }
  #hud span { font-weight: 400; color: #a07040; font-size: 0.85em; }
  #canvas-wrap {
    position: relative;
    border-radius: 12px;
    border: 2px solid #e8d8a0;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(120,80,0,0.12);
    width: min(560px, 100vw - 16px);
  }
  canvas {
    display: block;
    width: 100%;
    height: auto;
  }
  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(255,251,230,0.92);
    color: #5a3300;
  }
  #overlay h2 { font-size: clamp(16px, 4vw, 24px); font-weight: 700; margin: 0 0 8px; }
  #overlay p { font-size: clamp(11px, 3vw, 14px); color: #a07040; margin: 0 0 20px; text-align: center; line-height: 1.8; padding: 0 12px; }
  #overlay button {
    padding: 12px 36px;
    border-radius: 8px;
    border: 2px solid #c8a060;
    background: #fff8e1;
    color: #7a4500;
    font-size: clamp(14px, 4vw, 16px);
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    font-family: inherit;
    -webkit-tap-highlight-color: transparent;
  }
  #overlay button:active { background: #ffefc0; transform: scale(1.04); }
  #msg {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    font-size: clamp(14px, 4vw, 20px);
    font-weight: 700;
    pointer-events: none;
    opacity: 0;
    color: #b05a00;
    text-shadow: 0 1px 6px rgba(255,255,255,0.9);
    white-space: nowrap;
  }
  #info {
    margin-top: 8px;
    font-size: clamp(10px, 2.5vw, 12px);
    color: #b09060;
    text-align: center;
  }
  /* バーチャルDパッド */
  #dpad {
    display: none;
    margin-top: 16px;
    position: relative;
    width: 140px;
    height: 140px;
    flex-shrink: 0;
  }
  #dpad button {
    position: absolute;
    width: 44px;
    height: 44px;
    border-radius: 8px;
    border: 2px solid #c8a060;
    background: rgba(255,248,225,0.9);
    color: #7a4500;
    font-size: 20px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;
    user-select: none;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #dpad button:active, #dpad button.pressed { background: #ffd080; }
  #btn-up    { top: 0;   left: 50%; transform: translateX(-50%); }
  #btn-down  { bottom: 0; left: 50%; transform: translateX(-50%); }
  #btn-left  { left: 0;  top: 50%; transform: translateY(-50%); }
  #btn-right { right: 0; top: 50%; transform: translateY(-50%); }
  @media (pointer: coarse) {
    #dpad { display: flex; }
    body { justify-content: flex-start; padding-top: 12px; overflow-y: auto; }
  }
</style>
</head>
<body>
<h1>💩 うんこバクバクゲーム 💩</h1>
<div id="hud">
  <div>スコア: <span id="score-val">0</span></div>
  <div>レベル: <span id="level-val">1</span></div>
  <div>残機: <span id="lives-val">❤️❤️❤️</span></div>
</div>
<div id="canvas-wrap">
  <canvas id="gc" width="560" height="400"></canvas>
  <div id="msg"></div>
  <div id="overlay">
    <h2>💩 うんこバクバクゲーム 💩</h2>
    <p>うんこを食べまくれ！💣 爆弾は避けろ！<br>1:30後に特殊うんこ登場：💖 1UP / 🐌 スロー / ⚡ スピード<br>3分後には 💀 黒いうんこも…<br>📱 画面をドラッグして操作 | ⌨️ 矢印キーでも OK</p>
    <button onclick="startGame()">スタート！</button>
  </div>
</div>
<div id="info">📱 ドラッグ or Dパッドで操作 | ⌨️ 矢印キーでも OK</div>
<div id="dpad">
  <button id="btn-up"    aria-label="上">▲</button>
  <button id="btn-left"  aria-label="左">◀</button>
  <button id="btn-right" aria-label="右">▶</button>
  <button id="btn-down"  aria-label="下">▼</button>
</div>

<script>
const canvas = document.getElementById('gc');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

let state = 'idle';
let score = 0, level = 1, lives = 3;
let player, unkos, bombs, specialUnkos, particles, frame, animId;
let keys = {};
let slowTimer = 0, fastTimer = 0, hellTimer = 0;

// タッチ操作
let touchTarget = null;

function getCanvasPos(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (clientX - rect.left) * (W / rect.width),
    y: (clientY - rect.top)  * (H / rect.height)
  };
}

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (state !== 'playing') return;
  touchTarget = getCanvasPos(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (state !== 'playing') return;
  touchTarget = getCanvasPos(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  touchTarget = null;
}, { passive: false });

// バーチャルDパッド
const dpadMap = {
  'btn-up':    'ArrowUp',
  'btn-down':  'ArrowDown',
  'btn-left':  'ArrowLeft',
  'btn-right': 'ArrowRight'
};
for (const [id, key] of Object.entries(dpadMap)) {
  const btn = document.getElementById(id);
  btn.addEventListener('touchstart', e => { e.preventDefault(); keys[key] = true;  btn.classList.add('pressed'); },    { passive: false });
  btn.addEventListener('touchend',   e => { e.preventDefault(); keys[key] = false; btn.classList.remove('pressed'); }, { passive: false });
  btn.addEventListener('mousedown',  () => { keys[key] = true;  btn.classList.add('pressed'); });
  btn.addEventListener('mouseup',    () => { keys[key] = false; btn.classList.remove('pressed'); });
  btn.addEventListener('mouseleave', () => { keys[key] = false; btn.classList.remove('pressed'); });
}

document.addEventListener('keydown', e => {
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
  keys[e.key] = true;
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

function startGame() {
  document.getElementById('overlay').style.display = 'none';
  score = 0; level = 1; lives = 3;
  player = { x: W/2, y: H/2, vx: 0, vy: 0, invincible: 0 };
  unkos = []; bombs = []; specialUnkos = []; particles = [];
  slowTimer = 0; fastTimer = 0; hellTimer = 0;
  frame = 0;
  touchTarget = null;
  updateHUD();
  if(animId) cancelAnimationFrame(animId);
  state = 'playing';
  loop();
}

function spawnUnko() {
  const side = Math.random();
  let x, y;
  if(side < 0.25)      { x = Math.random()*W; y = -30; }
  else if(side < 0.5)  { x = Math.random()*W; y = H+30; }
  else if(side < 0.75) { x = -30; y = Math.random()*H; }
  else                 { x = W+30; y = Math.random()*H; }
  const angle = Math.atan2(H/2-y, W/2-x) + (Math.random()-0.5)*0.8;
  const spd = 0.6 + Math.random()*0.8 + level*0.1;
  unkos.push({ x, y, vx: Math.cos(angle)*spd, vy: Math.sin(angle)*spd, rot: Math.random()*Math.PI*2, size: 20+Math.random()*10 });
}

function spawnBomb() {
  const side = Math.random();
  let x, y;
  if(side < 0.25)      { x = Math.random()*W; y = -30; }
  else if(side < 0.5)  { x = Math.random()*W; y = H+30; }
  else if(side < 0.75) { x = -30; y = Math.random()*H; }
  else                 { x = W+30; y = Math.random()*H; }
  const angle = Math.atan2(H/2-y, W/2-x) + (Math.random()-0.5)*0.5;
  const spd = 0.5 + Math.random()*0.6 + level*0.08;
  bombs.push({ x, y, vx: Math.cos(angle)*spd, vy: Math.sin(angle)*spd, rot: Math.random()*Math.PI*2 });
}

function addParticles(x, y, color, n) {
  for(let i=0;i<n;i++) {
    const angle = Math.random()*Math.PI*2;
    const spd = 1+Math.random()*3;
    particles.push({ x, y, vx: Math.cos(angle)*spd, vy: Math.sin(angle)*spd, life: 40+Math.random()*20, color, size: 4+Math.random()*5 });
  }
}

function spawnSpecialUnko(type) {
  const side = Math.random();
  let x, y;
  if(side < 0.25)      { x = Math.random()*W; y = -30; }
  else if(side < 0.5)  { x = Math.random()*W; y = H+30; }
  else if(side < 0.75) { x = -30; y = Math.random()*H; }
  else                 { x = W+30; y = Math.random()*H; }
  const angle = Math.atan2(H/2-y, W/2-x) + (Math.random()-0.5)*0.6;
  const spd = 0.5 + Math.random()*0.5;
  specialUnkos.push({ x, y, vx: Math.cos(angle)*spd, vy: Math.sin(angle)*spd, rot: Math.random()*Math.PI*2, type });
}

function drawUnko(cx, cy, size, rot) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(rot);
  ctx.scale(size/24, size/24);
  ctx.font = '24px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('💩', 0, 0);
  ctx.restore();
}

function drawBomb(cx, cy, rot) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(rot);
  ctx.font = '22px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('💣', 0, 0);
  ctx.restore();
}

function drawSpecialUnko(s) {
  const pulse = 0.8 + 0.2 * Math.sin(frame * 0.15);
  ctx.save();
  ctx.translate(s.x, s.y);
  ctx.rotate(s.rot);
  if(s.type === 'oneup')  { ctx.shadowColor = '#ff88cc'; ctx.shadowBlur = 14 * pulse; }
  if(s.type === 'slow')   { ctx.shadowColor = '#44aaff'; ctx.shadowBlur = 14 * pulse; }
  if(s.type === 'fast')   { ctx.shadowColor = '#ffdd00'; ctx.shadowBlur = 14 * pulse; }
  if(s.type === 'hell')   { ctx.shadowColor = '#220000'; ctx.shadowBlur = 22 * pulse; }
  ctx.font = '26px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  if(s.type === 'hell') {
    // 黒く塗って描画
    ctx.filter = 'brightness(0)';
    ctx.fillText('💩', 0, 0);
    ctx.filter = 'none';
  } else {
    ctx.fillText('💩', 0, 0);
  }
  ctx.shadowBlur = 0;
  ctx.font = '12px serif';
  const label = s.type === 'oneup' ? '💖' : s.type === 'slow' ? '🐌' : s.type === 'fast' ? '⚡' : '💀';
  ctx.fillText(label, 14, -14);
  ctx.restore();
}

function drawPlayer(p) {
  if(p.invincible > 0 && Math.floor(p.invincible/5)%2===0) return;
  ctx.save();
  ctx.translate(p.x, p.y);
  ctx.font = '28px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('😮', 0, 0);
  ctx.restore();
}

function dist(a, b) { return Math.sqrt((a.x-b.x)**2+(a.y-b.y)**2); }

function showMsg(txt) {
  const el = document.getElementById('msg');
  el.textContent = txt;
  el.style.transition = 'none';
  el.style.opacity = '1';
  el.style.top = '10px';
  setTimeout(() => {
    el.style.transition = 'opacity 0.8s, top 0.8s';
    el.style.opacity = '0';
    el.style.top = '-10px';
  }, 600);
}

function updateHUD() {
  document.getElementById('score-val').textContent = score;
  document.getElementById('level-val').textContent = level;
  document.getElementById('lives-val').textContent = '❤️'.repeat(lives);
}

function gameOver() {
  state = 'over';
  const ov = document.getElementById('overlay');
  ov.innerHTML = `<h2>ゲームオーバー</h2><p>スコア: ${score} pts<br>レベル: ${level}</p><button onclick="startGame()">もう一回！</button>`;
  ov.style.display = 'flex';
}

function loop() {
  if(state !== 'playing') return;
  frame++;

  const speed = (2.8 + level*0.2) * (fastTimer > 0 ? 1.9 : 1) * (slowTimer > 0 ? 0.45 : 1);

  // タッチ操作：タッチ位置へ向かう
  if (touchTarget) {
    const dx = touchTarget.x - player.x;
    const dy = touchTarget.y - player.y;
    const d = Math.sqrt(dx*dx + dy*dy);
    if (d > 8) {
      player.vx += (dx / d) * 0.6;
      player.vy += (dy / d) * 0.6;
    }
  }

  // キーボード / Dパッド操作
  if(keys['ArrowLeft'])  player.vx -= 0.5;
  if(keys['ArrowRight']) player.vx += 0.5;
  if(keys['ArrowUp'])    player.vy -= 0.5;
  if(keys['ArrowDown'])  player.vy += 0.5;

  player.vx *= 0.82;
  player.vy *= 0.82;
  const spd = Math.sqrt(player.vx**2+player.vy**2);
  if(spd > speed) { player.vx = player.vx/spd*speed; player.vy = player.vy/spd*speed; }
  player.x = Math.max(14, Math.min(W-14, player.x + player.vx));
  player.y = Math.max(14, Math.min(H-14, player.y + player.vy));
  if(player.invincible > 0) player.invincible--;

  const interval = Math.max(30, 80 - level*5);
  if(frame % interval === 0) spawnUnko();
  if(frame % (interval+20) === 0) spawnBomb();

  // 特殊うんこは1:30（5400f）から
  if(frame >= 5400) {
    if(frame % 300 === 150) {
      spawnSpecialUnko(Math.random() < 0.5 ? 'slow' : 'fast');
    }
    // 1UPは残機3未満のとき1/300の確率
    if(lives < 3 && Math.random() < 1/300) spawnSpecialUnko('oneup');
    // 黒うんこは3分（10800f）から1/300の確率
    if(frame >= 10800 && Math.random() < 1/300) spawnSpecialUnko('hell');
  }

  if(slowTimer > 0) slowTimer--;
  if(fastTimer > 0) fastTimer--;
  if(hellTimer > 0) hellTimer--;

  const bombMult = hellTimer > 0 ? 3.5 : 1;
  for(let u of unkos) { u.x += u.vx; u.y += u.vy; u.rot += 0.04; }
  for(let b of bombs) { b.x += b.vx * bombMult; b.y += b.vy * bombMult; b.rot += 0.06 * bombMult; }
  for(let s of specialUnkos) { s.x += s.vx; s.y += s.vy; s.rot += 0.05; }

  unkos = unkos.filter(u => {
    if(u.x < -60||u.x > W+60||u.y < -60||u.y > H+60) return false;
    if(dist(u, player) < 18 + u.size*0.4) {
      addParticles(u.x, u.y, '#c8a060', 8);
      score += 10 + level;
      const msgs = ['バクッ！','ウマッ！','パクッ！','もぐもぐ！','ゴクッ！'];
      if(Math.random()<0.4) showMsg(msgs[Math.floor(Math.random()*msgs.length)]);
      if(score >= level * 120) { level++; showMsg('レベルアップ！🎉'); }
      updateHUD();
      return false;
    }
    return true;
  });

  bombs = bombs.filter(b => {
    if(b.x < -60||b.x > W+60||b.y < -60||b.y > H+60) return false;
    if(player.invincible === 0 && dist(b, player) < 18) {
      addParticles(b.x, b.y, '#ff6633', 12);
      lives--;
      player.invincible = 90;
      showMsg('ドカン！💥');
      updateHUD();
      if(lives <= 0) { gameOver(); return false; }
      return false;
    }
    return true;
  });

  specialUnkos = specialUnkos.filter(s => {
    if(s.x < -60||s.x > W+60||s.y < -60||s.y > H+60) return false;
    if(dist(s, player) < 22) {
      if(s.type === 'oneup') {
        lives = Math.min(lives + 1, 3);
        addParticles(s.x, s.y, '#ff88cc', 14);
        showMsg('1UP！💖 残機+1！');
        updateHUD();
      } else if(s.type === 'slow') {
        slowTimer = 300;
        addParticles(s.x, s.y, '#44aaff', 14);
        showMsg('スロー！🐌 自分がのろのろ…');
      } else if(s.type === 'fast') {
        fastTimer = 300;
        addParticles(s.x, s.y, '#ffdd00', 14);
        showMsg('スピードアップ！⚡');
      } else if(s.type === 'hell') {
        hellTimer = 600;
        addParticles(s.x, s.y, '#440000', 20);
        showMsg('💀 地獄！爆弾が暴走する！！');
      }
      return false;
    }
    return true;
  });

  particles = particles.filter(p => {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.08;
    p.life--;
    return p.life > 0;
  });

  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#fffbe6';
  ctx.fillRect(0, 0, W, H);
  // 地獄中は赤オーバーレイを重ねる
  if(hellTimer > 0) {
    const r = 0.5 + 0.5 * Math.sin(frame * 0.3);
    ctx.fillStyle = `rgba(180,0,0,${0.10 + 0.08*r})`;
    ctx.fillRect(0, 0, W, H);
  }

  ctx.strokeStyle = '#f0e8c8';
  ctx.lineWidth = 1;
  for(let gx=0; gx<W; gx+=40) { ctx.beginPath(); ctx.moveTo(gx,0); ctx.lineTo(gx,H); ctx.stroke(); }
  for(let gy=0; gy<H; gy+=40) { ctx.beginPath(); ctx.moveTo(0,gy); ctx.lineTo(W,gy); ctx.stroke(); }

  for(let p of particles) {
    ctx.globalAlpha = p.life/50;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  for(let u of unkos) drawUnko(u.x, u.y, u.size, u.rot);
  for(let b of bombs) drawBomb(b.x, b.y, b.rot);
  for(let s of specialUnkos) drawSpecialUnko(s);
  drawPlayer(player);

  // エフェクト残り時間表示
  if(slowTimer > 0 || fastTimer > 0 || hellTimer > 0) {
    ctx.save();
    ctx.font = 'bold 13px sans-serif';
    ctx.textBaseline = 'top';
    let ex = 6;
    if(slowTimer > 0) {
      ctx.fillStyle = '#1188ff';
      ctx.fillText(`🐌 ${Math.ceil(slowTimer/60)}s`, ex, 6);
      ex += 64;
    }
    if(fastTimer > 0) {
      ctx.fillStyle = '#cc8800';
      ctx.fillText(`⚡ ${Math.ceil(fastTimer/60)}s`, ex, 6);
      ex += 64;
    }
    if(hellTimer > 0) {
      ctx.fillStyle = '#cc0000';
      ctx.fillText(`💀 ${Math.ceil(hellTimer/60)}s`, ex, 6);
    }
    ctx.restore();
  }

  animId = requestAnimationFrame(loop);
}
</script>
</body>
</html>
